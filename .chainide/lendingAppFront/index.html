<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timed Lending DApp</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.6.2/dist/ethers.umd.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 30px auto;
            padding: 20px;
        }

        input,
        button {
            margin: 6px 0 12px;
            padding: 8px;
            width: 100%;
            box-sizing: border-box;
        }

        button {
            cursor: pointer;
        }

        hr {
            margin: 24px 0;
        }

        #wallet,
        #status,
        #repaymentAmount {
            padding: 10px;
            background: #f5f5f5;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

    <h1>Timed Lending</h1>

    <button onclick="connectWallet()">Connect Wallet</button>
    <p id="wallet">Not connected</p>
    <p id="status">Ready</p>

    <hr>

    <h2>Create Loan</h2>

    <label>Interest Rate (%)</label>
    <input id="interest" type="number" />

    <label>Duration (seconds)</label>
    <input id="duration" type="number" />

    <label>Penalty per second (wei)</label>
    <input id="penalty" type="number" />

    <label>Principal (ETH)</label>
    <input id="principal" type="text" placeholder="Example: 0.1" />

    <button onclick="createLoan()">Create Loan</button>

    <hr>

    <h2>Take Loan</h2>

    <label>Loan ID</label>
    <input id="takeLoanId" type="number" />

    <button onclick="takeLoan()">Take Loan</button>

    <hr>

    <h2>Check Repayment</h2>

    <label>Loan ID</label>
    <input id="repayCheckId" type="number" />

    <button onclick="checkRepayment()">Check Amount</button>

    <p id="repaymentAmount"></p>

    <hr>

    <h2>Repay Loan</h2>

    <label>Loan ID</label>
    <input id="repayLoanId" type="number" />

    <label>Amount (ETH)</label>
    <input id="repayAmount" type="text" placeholder="Example: 0.11" />

    <button onclick="repayLoan()">Repay Loan</button>

    <script src="app.js"></script>
</body>

</html>
